// ── App-level build.gradle ─────────────────────────────────────
// android/app/build.gradle

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

react {
    // React Native configuration
    bundleAssetName    = "index.android.bundle"
    entryFile          = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", rootDir.absolutePath, "android", "absolute"].execute(null, rootDir).text.trim())
    enableHermes       = true
    hermesFlags        = ["-O", "-output-source-map"]
}

android {
    namespace          "dev.tlg3d.cutflow"
    compileSdk         rootProject.ext.compileSdkVersion
    ndkVersion         rootProject.ext.ndkVersion

    defaultConfig {
        applicationId  "dev.tlg3d.cutflow"
        minSdk         rootProject.ext.minSdkVersion
        targetSdk      rootProject.ext.targetSdkVersion
        versionCode    1
        versionName    "0.1.0"

        // Required for react-native-webrtc
        ndk { abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64" }

        manifestPlaceholders = [
            appName:   "CutFlow",
            appLabel:  "@string/app_name"
        ]
    }

    signingConfigs {
        debug {
            storeFile     file("debug.keystore")
            storePassword "android"
            keyAlias      "androiddebugkey"
            keyPassword   "android"
        }
        release {
            // Set via environment variables for CI/CD
            if (System.getenv("KEYSTORE_FILE")) {
                storeFile     file(System.getenv("KEYSTORE_FILE"))
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias      System.getenv("KEY_ALIAS")
                keyPassword   System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        debug {
            signingConfig  signingConfigs.debug
            debuggable     true
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "CutFlow Dev"
        }
        release {
            signingConfig  signingConfigs.release
            minifyEnabled  true
            shrinkResources true
            proguardFiles  getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            resValue "string", "app_name", "CutFlow"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig true
    }

    packagingOptions {
        pickFirst "lib/x86/libc++_shared.so"
        pickFirst "lib/x86_64/libc++_shared.so"
        pickFirst "lib/armeabi-v7a/libc++_shared.so"
        pickFirst "lib/arm64-v8a/libc++_shared.so"
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // Kotlin
    implementation("org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}")

    // AndroidX
    implementation("androidx.core:core-ktx:1.12.0")
    implementation("androidx.appcompat:appcompat:1.6.1")
    implementation("androidx.biometric:biometric:1.2.0-alpha05")
    implementation("androidx.fragment:fragment-ktx:1.6.2")

    // Firebase
    implementation(platform("com.google.firebase:firebase-bom:32.7.0"))
    implementation("com.google.firebase:firebase-messaging-ktx")
    implementation("com.google.firebase:firebase-analytics-ktx")
    implementation("com.google.firebase:firebase-crashlytics-ktx")

    // FileProvider for sharing
    implementation("androidx.core:core:1.12.0")

    // NSD (Network Service Discovery) — built into Android SDK, no extra dep needed
}
